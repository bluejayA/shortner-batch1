services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortner
      POSTGRES_USER: shortner
      POSTGRES_PASSWORD: shortner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
